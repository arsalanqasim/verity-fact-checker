services:
  mcp-server:
    build:
      context: ./brave-search-mcp-sse
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - PORT=3001
    restart: unless-stopped

  slack-worker:
    build:
      context: .
      dockerfile: Dockerfile.slack-app
    env_file:
      - .env
    depends_on:
      - mcp-server
    restart: unless-stopped
